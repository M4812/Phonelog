<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>问题登记</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-container header-inner">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">问</div>
        <div>
          <div class="header-kicker">Issue Registry</div>
          <h1 class="header-title">问题登记</h1>
        </div>
      </div>
      <div class="header-path">
        <span class="path-label">共享数据文件</span>
        <code>data/records.json</code>
      </div>
    </div>
  </header>

  <main class="app-container app-main">
    <section class="dashboard-grid" aria-label="今日数据简报">
      <article class="metric-card metric-slate">
        <div class="metric-icon" aria-hidden="true">总</div>
        <div class="metric-content">
          <div class="metric-label">总问题条数</div>
          <div class="metric-number" id="totalProblems">0</div>
          <div class="metric-note">累计登记</div>
        </div>
      </article>
      <article class="metric-card metric-blue">
        <div class="metric-icon" aria-hidden="true">今</div>
        <div class="metric-content">
          <div class="metric-label">今日总来电</div>
          <div class="metric-number" id="todayTotal">0</div>
          <div class="metric-note">今日新增</div>
        </div>
      </article>
      <article class="metric-card metric-green">
        <div class="metric-icon" aria-hidden="true">解</div>
        <div class="metric-content">
          <div class="metric-label">今日已解决</div>
          <div class="metric-number" id="todayResolved">0</div>
          <div class="metric-note">已完成处理</div>
        </div>
      </article>
      <article class="metric-card metric-red">
        <div class="metric-icon" aria-hidden="true">待</div>
        <div class="metric-content">
          <div class="metric-label">未解决的问题</div>
          <div class="metric-number" id="todayUnresolved">0</div>
          <div class="metric-note">需要跟进</div>
        </div>
      </article>
    </section>

    <section class="data-card">
      <div class="table-toolbar">
        <div class="toolbar-left" role="search" aria-label="历史记录查询">
          <div class="search-field">
            <span class="search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="20" height="20" focusable="false">
                <path d="M10.8 17.2a6.4 6.4 0 1 1 4.53-1.87l3.67 3.67-1.42 1.42-3.67-3.67a6.37 6.37 0 0 1-3.11.45Zm0-2a4.4 4.4 0 1 0 0-8.8 4.4 4.4 0 0 0 0 8.8Z"></path>
              </svg>
            </span>
            <input
              type="search"
              id="searchInput"
              class="form-control"
              placeholder="搜索姓名、单位、电话或问题关键词"
              aria-label="搜索姓名、单位、电话或问题"
            >
          </div>
          <select id="statusFilter" class="form-select status-filter" aria-label="状态筛选">
            <option value="all">全部记录</option>
            <option value="resolved">仅看已解决</option>
            <option value="unresolved">仅看未解决</option>
          </select>
        </div>

        <div class="toolbar-actions">
          <button type="button" class="btn btn-primary action-primary" data-bs-toggle="modal" data-bs-target="#recordModal">
            + 新增来电记录
          </button>
          <a class="btn btn-outline-secondary action-secondary" href="/api/export/csv" id="exportCsvBtn">导出所选 CSV</a>
        </div>
      </div>

      <div class="table-title-row">
        <div>
          <h2>历史记录</h2>
          <p>最新记录优先展示，可直接在表格内更新状态和处理结果。</p>
        </div>
        <span class="record-count" id="recordCount">共 0 条</span>
      </div>

      <div class="table-responsive records-table-wrap">
        <table class="table records-table align-middle mb-0">
          <thead>
            <tr>
              <th scope="col" class="select-column">
                <input type="checkbox" class="form-check-input" id="selectAllRecords" aria-label="全选当前记录">
              </th>
              <th scope="col">来电时间</th>
              <th scope="col">来电人</th>
              <th scope="col">来电单位</th>
              <th scope="col">电话号码</th>
              <th scope="col" class="question-column">问题/诉求</th>
              <th scope="col">状态</th>
              <th scope="col" class="resolution-column">处理结果</th>
              <th scope="col" class="text-end">操作</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr>
              <td colspan="9" class="text-center text-muted py-5">正在加载...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="import-card" hidden aria-hidden="true">
      <div class="import-copy">
        <h2>导入数据</h2>
        <p>支持系统导出的 CSV 或备份 JSON，导入后自动刷新表格。</p>
      </div>
      <form id="importForm" class="import-form" enctype="multipart/form-data">
        <div class="import-control">
          <label for="importFile" class="form-label">导入文件</label>
          <input type="file" id="importFile" name="file" class="form-control" accept=".csv,.json" required>
        </div>
        <div class="import-control">
          <label for="importMode" class="form-label">导入方式</label>
          <select id="importMode" name="mode" class="form-select">
            <option value="merge">合并导入（按 ID 去重）</option>
            <option value="overwrite">覆盖现有数据</option>
          </select>
        </div>
        <div class="import-submit">
          <button type="submit" class="btn btn-light">开始导入</button>
          <span class="small text-muted" id="importStatus" role="status"></span>
        </div>
      </form>
    </section>
  </main>

  <div class="modal fade" id="recordModal" tabindex="-1" aria-labelledby="recordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <form id="recordForm">
          <div class="modal-header">
            <div>
              <div class="modal-eyebrow">New Call</div>
              <h2 class="modal-title" id="recordModalLabel">新增来电记录</h2>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="callTime" class="form-label">来电时间</label>
                <input type="datetime-local" id="callTime" name="callTime" class="form-control">
              </div>
              <div class="col-md-6">
                <label for="isResolved" class="form-label">是否解决</label>
                <select id="isResolved" name="isResolved" class="form-select">
                  <option value="false">未解决</option>
                  <option value="true">已解决</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="callerName" class="form-label">来电人姓名</label>
                <input type="text" id="callerName" name="callerName" class="form-control" required maxlength="60">
              </div>
              <div class="col-md-6">
                <label for="callerUnit" class="form-label">来电单位</label>
                <input type="text" id="callerUnit" name="callerUnit" class="form-control" maxlength="100">
              </div>
              <div class="col-md-6">
                <label for="phoneNumber" class="form-label">电话号码</label>
                <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control" required maxlength="40">
              </div>
              <div class="col-12">
                <label for="question" class="form-label">来电问题/诉求</label>
                <textarea id="question" name="question" class="form-control" rows="4" required></textarea>
              </div>
              <div class="col-12">
                <label for="resolution" class="form-label">如何解决的/处理结果</label>
                <textarea id="resolution" name="resolution" class="form-control" rows="3"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <span class="small text-muted me-auto" id="formStatus" role="status"></span>
            <button type="reset" class="btn btn-light" id="resetFormBtn">清空</button>
            <button type="submit" class="btn btn-primary action-primary">保存记录</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/script.js"></script>
</body>
</html>
