<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>电话记录管理</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-shell header-inner">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M7.6 4.5h8.8c1.1 0 2 .9 2 2v11c0 1.1-.9 2-2 2H7.6c-1.1 0-2-.9-2-2v-11c0-1.1.9-2 2-2Zm.45 3.15v1.7h7.9v-1.7h-7.9Zm0 3.55v1.7h7.9v-1.7h-7.9Zm0 3.55v1.7h5.3v-1.7h-5.3Z"></path>
          </svg>
        </div>
        <div>
          <p class="header-kicker">Call Record Console</p>
          <h1>来电问题登记表</h1>
        </div>
      </div>
      <div class="storage-status" aria-label="数据存储路径">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="storage-label">数据存储路径</span>
        <code>Storage: ./data/records.json</code>
      </div>
    </div>
  </header>

  <main class="app-shell app-main">
    <section class="metrics" aria-label="记录统计">
      <article class="metric-card total">
        <div class="metric-meta">
          <span class="metric-label">总记录</span>
        </div>
        <strong id="totalProblems">0</strong>
        <span class="metric-help">累计登记数量</span>
      </article>
      <article class="metric-card today">
        <div class="metric-meta">
          <span class="metric-label">今日来电</span>
        </div>
        <strong id="todayTotal">0</strong>
        <span class="metric-help">今日新增记录</span>
      </article>
      <article class="metric-card resolved">
        <div class="metric-meta">
          <span class="metric-label">今日已解决</span>
        </div>
        <strong id="todayResolved">0</strong>
        <span class="metric-help">今日完成处理</span>
      </article>
      <article class="metric-card pending">
        <div class="metric-meta">
          <span class="metric-label">未解决</span>
        </div>
        <strong id="todayUnresolved">0</strong>
        <span class="metric-help">仍需继续跟进</span>
      </article>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div class="filters" role="search" aria-label="历史记录查询">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索姓名、单位、电话或问题">
          </label>
          <select id="statusFilter" aria-label="状态筛选">
            <option value="all">全部记录</option>
            <option value="resolved">仅看已解决</option>
            <option value="unresolved">仅看未解决</option>
          </select>
        </div>
        <div class="actions">
          <button type="button" class="btn secondary" id="openOrganizationBtn">
            <span class="btn-icon" aria-hidden="true">□</span>
            组织机构
          </button>
          <a class="btn contact-link-btn" href="/contacts.html">
            <span class="btn-icon" aria-hidden="true">☏</span>
            来电统计
          </a>
          <button type="button" class="btn primary" data-modal-open>
            <span class="btn-icon" aria-hidden="true">＋</span>
            新增记录
          </button>
          <button type="button" class="btn secondary" id="exportCsvBtn">
            <span class="btn-icon" aria-hidden="true">⇧</span>
            导出 CSV
          </button>
          <button type="button" class="btn secondary" id="openImportBtn">
            <span class="btn-icon" aria-hidden="true">⇩</span>
            导入
          </button>
        </div>
      </div>

      <div class="section-title">
        <div>
          <h2>历史记录</h2>
        </div>
        <span id="recordCount" class="count-pill">共 0 条</span>
      </div>

      <div class="table-wrap">
        <table class="records-table">
          <thead>
            <tr>
              <th class="check-col">
                <input type="checkbox" id="selectAllRecords" aria-label="全选当前记录">
              </th>
              <th>来电时间</th>
              <th>来电人</th>
              <th>来电单位</th>
              <th>电话号码</th>
              <th>问题/诉求</th>
              <th>状态</th>
              <th>处理结果</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr>
              <td colspan="9" class="empty-cell">正在加载...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar" aria-label="历史记录分页">
        <label>
          <span>每页显示</span>
          <select id="recordPageSize">
            <option value="10" selected>10 条</option>
            <option value="20">20 条</option>
            <option value="50">50 条</option>
            <option value="100">100 条</option>
          </select>
        </label>
        <div class="pagination-actions">
          <button type="button" class="row-btn" id="recordPrevPage">上一页</button>
          <span id="recordPageInfo">第 1 / 1 页</span>
          <button type="button" class="row-btn" id="recordNextPage">下一页</button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="recordModal" hidden>
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="recordModalLabel">
      <form id="recordForm">
        <div class="modal-header">
          <div>
            <p>新增来电</p>
            <h2 id="recordModalLabel">新增电话记录</h2>
          </div>
          <button type="button" class="icon-button" data-modal-close aria-label="关闭">×</button>
        </div>

        <div class="form-grid">
          <label>
            <span>来电时间</span>
            <input type="datetime-local" id="callTime" name="callTime">
          </label>
          <label>
            <span>是否解决</span>
            <select id="isResolved" name="isResolved">
              <option value="false">未解决</option>
              <option value="true" selected>已解决</option>
            </select>
          </label>
          <label>
            <span>来电人姓名</span>
            <input type="text" id="callerName" name="callerName" required maxlength="60" autocomplete="off" data-suggestion-field="callerName">
          </label>
          <label>
            <span>来电单位</span>
            <input type="text" id="callerUnit" name="callerUnit" maxlength="100" autocomplete="off" data-organization-field="callerUnit">
          </label>
          <label>
            <span>电话号码</span>
            <input type="tel" id="phoneNumber" name="phoneNumber" required maxlength="40" autocomplete="off" data-suggestion-field="phoneNumber">
          </label>
          <label class="wide">
            <span>来电问题/诉求</span>
            <textarea id="question" name="question" rows="4" required></textarea>
          </label>
          <label class="wide">
            <span>处理结果</span>
            <textarea id="resolution" name="resolution" rows="3"></textarea>
          </label>
        </div>

        <div class="modal-footer">
          <span id="formStatus" role="status"></span>
          <div class="footer-actions">
            <button type="reset" class="btn" id="resetFormBtn">清空</button>
            <button type="submit" class="btn primary">保存记录</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="organizationModal" hidden>
    <div class="modal-window small" role="dialog" aria-modal="true" aria-labelledby="organizationModalLabel">
      <form id="organizationForm">
        <div class="modal-header">
          <div>
            <p>基础字典</p>
            <h2 id="organizationModalLabel">组织机构</h2>
          </div>
          <button type="button" class="icon-button" data-organization-close aria-label="关闭">×</button>
        </div>
        <div class="organization-manager">
          <label>
            <span>组织机构名称</span>
            <div class="organization-add-row">
              <input type="text" id="organizationName" name="name" maxlength="100" autocomplete="off" placeholder="例如：中心">
              <button type="submit" class="btn primary">添加</button>
            </div>
          </label>
          <span id="organizationStatus" role="status"></span>
          <div class="organization-list" id="organizationList" aria-label="组织机构列表"></div>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="importModal" hidden>
    <div class="modal-window small" role="dialog" aria-modal="true" aria-labelledby="importModalLabel">
      <form id="importForm" enctype="multipart/form-data">
        <div class="modal-header">
          <div>
            <p>数据导入</p>
            <h2 id="importModalLabel">导入 CSV 或 JSON</h2>
          </div>
          <button type="button" class="icon-button" data-import-close aria-label="关闭">×</button>
        </div>
        <div class="form-grid single">
          <label>
            <span>导入文件</span>
            <input type="file" id="importFile" name="file" accept=".csv,.json" required>
          </label>
          <label>
            <span>导入方式</span>
            <select id="importMode" name="mode">
              <option value="merge">合并导入（按 ID 去重）</option>
              <option value="overwrite">覆盖现有数据</option>
            </select>
          </label>
        </div>
        <div class="modal-footer">
          <span id="importStatus" role="status"></span>
          <button type="submit" class="btn primary">开始导入</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/script.js?v=organization-suggestions-20260526"></script>
</body>
</html>
